# qa-automation-core default properties
# Sensitive values MUST be set via env var or system property, never here.

qa.api.baseUri=http://localhost:8080
qa.api.timeoutMs=30000

qa.aihub.baseUri=http://localhost:9080
qa.aihub.localEnv=local

qa.mobile.platform=android
qa.mobile.appiumUrl=http://localhost:4723

qa.retry.maxAttempts=3
qa.retry.initialBackoffMs=1000
qa.retry.maxBackoffMs=30000

qa.report.outputDir=build
